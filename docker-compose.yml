name: conk

# ============================================================
# Named Volumes (컨테이너 재시작 후에도 데이터 유지)
# ============================================================
volumes:
  member-db-data:
  integration-db-data:
  notification-db-data:
  wms-db-data:
  wms-read-db-data:
  order-db-data:
  batch-db-data:
  redis-data:
  kafka-data:

# ============================================================
# Networks (서비스 간 내부 통신 격리)
# ============================================================
networks:
  conk-network:
    driver: bridge

services:

  # ============================================================
  # API Gateway — Nginx (JWT auth_request + 리버스 프록시)
  # 외부 포트 80 → 각 백엔드 서비스로 라우팅
  # ============================================================
  api-gateway:
    image: nginx:stable-alpine
    container_name: conk-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      member-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      wms-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      batch-service:
        condition: service_healthy
    networks:
      - conk-network
    restart: unless-stopped

  # ============================================================
  # Frontend — Vue 3 + Vite (Nginx 서빙)
  # 외부 포트 3000 → Vue SPA 정적 파일 서빙
  # ============================================================
  frontend:
    build:
      context: ./team1-frontend
      target: build    # node:22-alpine stage (nginx stage 불필요)
    container_name: conk-frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./team1-frontend:/app          # 소스 코드 실시간 동기화 (HMR)
      - /app/node_modules              # 컨테이너 node_modules 보호
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_API_PREFIX=${VITE_API_PREFIX}
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped

  # ============================================================
  # Backend Services
  # ============================================================

  member-service:
    build:
      context: ./team1-backend-member
      dockerfile: Dockerfile
    container_name: conk-member-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${MEMBER_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
      - MAIL_SERVICE_NAME=${MAIL_SERVICE_NAME}
      - MAIL_LOGIN_URL=${MAIL_LOGIN_URL}
      - MAIL_SETUP_BASE_URL=${MAIL_SETUP_BASE_URL}
      - WAREHOUSE_SERVICE_URL=${WAREHOUSE_SERVICE_URL}
    depends_on:
      member-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 300s
      interval: 20s
      timeout: 10s
      retries: 10

  integration-service:
    build:
      context: ./team1-backend-integration
      dockerfile: Dockerfile
    container_name: conk-integration-service
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${INTEGRATION_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - EASYPOST_API_KEY=${EASYPOST_API_KEY}
      - EASYPOST_BASE_URL=${EASYPOST_BASE_URL}
      - SHOPIFY_API_VERSION=${SHOPIFY_API_VERSION}
    depends_on:
      integration-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 300s
      interval: 20s
      timeout: 10s
      retries: 10

  notification-service:
    build:
      context: ./team1-backend-notification
      dockerfile: Dockerfile
    container_name: conk-notification-service
    ports:
      - "8085:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${NOTIFICATION_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - NOTIFICATION_KAFKA_CONSUMER_GROUP_ID=${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID}
      - NOTIFICATION_SSE_TIMEOUT=${NOTIFICATION_SSE_TIMEOUT}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - MEMBER_SERVICE_URL=${MEMBER_SERVICE_URL}
    depends_on:
      notification-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 300s
      interval: 20s
      timeout: 10s
      retries: 10

  wms-service:
    build:
      context: ./team1-backend-wms
      dockerfile: Dockerfile
    container_name: conk-wms-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${WMS_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MEMBER_SERVICE_URL=${MEMBER_SERVICE_URL}
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL}
      - INTEGRATION_SERVICE_URL=${INTEGRATION_SERVICE_URL}
      - WMS_STUB_CLIENTS_ENABLED=${WMS_STUB_CLIENTS_ENABLED}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_CONSUMER_GROUP_ID=${KAFKA_CONSUMER_GROUP_ID}
      - APP_KAFKA_TOPICS_BILLING_MONTHLY_RESULT=${APP_KAFKA_TOPIC_BILLING_MONTHLY_RESULT}
      - APP_KAFKA_CONSUMER_BILLING_MONTHLY_RESULT_AUTO_STARTUP=true
    depends_on:
      wms-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 300s
      interval: 20s
      timeout: 10s
      retries: 10

  order-service:
    build:
      context: ./team1-backend-order
      dockerfile: Dockerfile
    container_name: conk-order-service
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${ORDER_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - WMS_SERVICE_URL=${WMS_SERVICE_URL}
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 300s
      interval: 20s
      timeout: 10s
      retries: 10

  batch-service:
    build:
      context: ./team1-backend-batch
      dockerfile: Dockerfile
    container_name: conk-batch-service
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${BATCH_DB_URL}
      - BATCH_DB_USERNAME=${DB_USERNAME}
      - BATCH_DB_PASSWORD=${DB_PASSWORD}
      - WMS_READ_DB_URL=${WMS_READ_DB_URL}
      - WMS_READ_DB_USERNAME=${DB_USERNAME}
      - WMS_READ_DB_PASSWORD=${DB_PASSWORD}
      - WMS_SERVICE_URL=${WMS_SERVICE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - APP_BILLING_SCHEDULING_ENABLED=${APP_BILLING_SCHEDULING_ENABLED}
      - APP_BILLING_SCHEDULING_ZONE=${APP_BILLING_SCHEDULING_ZONE}
      - APP_BILLING_SCHEDULING_DAILY_BIN_SNAPSHOT_CRON=${APP_BILLING_SCHEDULING_DAILY_BIN_SNAPSHOT_CRON}
      - APP_BILLING_SCHEDULING_MONTHLY_BILLING_CRON=${APP_BILLING_SCHEDULING_MONTHLY_BILLING_CRON}
      - APP_KAFKA_TOPICS_BILLING_MONTHLY_RESULT=${APP_KAFKA_TOPIC_BILLING_MONTHLY_RESULT}
    depends_on:
      batch-db:
        condition: service_healthy
      wms-db:
        condition: service_healthy
      wms-read-db:
        condition: service_healthy
      wms-service:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5


  # ============================================================
  # MariaDB — 서비스별 완전 격리 (총 5개)
  # ============================================================

  member-db:
    image: mariadb:10.11
    container_name: conk-member-db
    ports:
      - "7009:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=member_db
    volumes:
      - member-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  integration-db:
    image: mariadb:10.11
    container_name: conk-integration-db
    ports:
      - "7010:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=integration_db
    volumes:
      - integration-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: mariadb:10.11
    container_name: conk-notification-db
    ports:
      - "7007:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=notification_db
    volumes:
      - notification-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  wms-db:
    image: mariadb:10.11
    container_name: conk-wms-db
    ports:
      - "7011:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=wms_db
    volumes:
      - wms-db-data:/var/lib/mysql
      - ./docker/mariadb/wms-primary/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
      - ./docker/mariadb/wms-primary/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  wms-read-db:
    image: mariadb:10.11
    container_name: conk-wms-read-db
    ports:
      - "7013:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=wms_db
    volumes:
      - wms-read-db-data:/var/lib/mysql
      - ./docker/mariadb/wms-replica/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5


  order-db:
    image: mariadb:10.11
    container_name: conk-order-db
    ports:
      - "7008:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=order_db
    volumes:
      - order-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  batch-db:
    image: mariadb:10.11
    container_name: conk-batch-db
    ports:
      - "7012:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=batch_db
    volumes:
      - batch-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5


  # ============================================================
  # Redis 7 — notification-service 알림 캐싱 + SSE Pub/Sub
  # ============================================================
  redis:
    image: redis:7
    container_name: conk-redis
    ports:
      - "7016:6379"    # 로컬 개발용 외부 노출
    command: ["--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Kafka 3.6 (KRaft 모드 — Zookeeper 불필요)
  # notification-service Consumer + 전 서비스 Producer 공용
  # ============================================================
  kafka:
    image: apache/kafka:latest
    container_name: conk-kafka
    ports:
      - "7017:9094"    # 로컬 Spring Boot 앱 전용
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT: Docker 내부 서비스 간 통신 (kafka:9092)
      # EXTERNAL:  호스트에서 실행 중인 Spring Boot 접속용 (localhost:9094)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://192.168.0.62:7017
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - conk-network
    restart: unless-stopped
