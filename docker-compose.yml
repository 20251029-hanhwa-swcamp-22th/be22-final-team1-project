name: conk

# ============================================================
# Named Volumes (컨테이너 재시작 후에도 데이터 유지)
# ============================================================
volumes:
  member-db-data:
  integration-db-data:
  notification-db-data:
  wms-db-data:
  order-db-data:
  redis-data:
  kafka-data:

# ============================================================
# Networks (서비스 간 내부 통신 격리)
# ============================================================
networks:
  conk-network:
    driver: bridge

services:

  # ============================================================
  # API Gateway — Nginx (JWT auth_request + 리버스 프록시)
  # 외부 포트 80 → 각 백엔드 서비스로 라우팅
  # ============================================================
  api-gateway:
    image: nginx:stable-alpine
    container_name: conk-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      member-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      wms-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - conk-network
    restart: unless-stopped

  # ============================================================
  # Frontend — Vue 3 + Vite (Nginx 서빙)
  # 외부 포트 3000 → Vue SPA 정적 파일 서빙
  # ============================================================
  frontend:
    build:
      context: ./team1-frontend
      dockerfile: Dockerfile
    container_name: conk-frontend
    ports:
      - "3000:80"
    networks:
      - conk-network
    restart: unless-stopped

  # ============================================================
  # Backend Services
  # ============================================================

  member-service:
    build:
      context: ./team1-backend-member
      dockerfile: Dockerfile
    container_name: conk-member-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mariadb://member-db:3306/member_db?useSSL=false&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=temp_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      member-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  integration-service:
    build:
      context: ./team1-backend-integration
      dockerfile: Dockerfile
    container_name: conk-integration-service
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mariadb://integration-db:3306/integration_db?useSSL=false&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=temp_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      integration-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./team1-backend-notification
      dockerfile: Dockerfile
    container_name: conk-notification-service
    ports:
      - "8085:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mariadb://notification-db:3306/notification_db?useSSL=false&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=temp_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - MEMBER_SERVICE_URL=http://member-service:8080
    depends_on:
      notification-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  wms-service:
    build:
      context: ./team1-backend-wms
      dockerfile: Dockerfile
    container_name: conk-wms-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mariadb://wms-db:3306/wms_db?useSSL=false&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=temp_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      wms-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./team1-backend-order
      dockerfile: Dockerfile
    container_name: conk-order-service
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mariadb://order-db:3306/order_db?useSSL=false&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=temp_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # MariaDB — 서비스별 완전 격리 (총 5개)
  # ============================================================

  member-db:
    image: mariadb:10.11
    container_name: conk-member-db
    ports:
      - "3309:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=temp_password
      - MARIADB_DATABASE=member_db
    volumes:
      - member-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  integration-db:
    image: mariadb:10.11
    container_name: conk-integration-db
    ports:
      - "3310:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=temp_password
      - MARIADB_DATABASE=integration_db
    volumes:
      - integration-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: mariadb:10.11
    container_name: conk-notification-db
    ports:
      - "3307:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=temp_password
      - MARIADB_DATABASE=notification_db
    volumes:
      - notification-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  wms-db:
    image: mariadb:10.11
    container_name: conk-wms-db
    ports:
      - "3311:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=temp_password
      - MARIADB_DATABASE=wms_db
    volumes:
      - wms-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: mariadb:10.11
    container_name: conk-order-db
    ports:
      - "3308:3306"    # 로컬 개발용 외부 노출
    environment:
      - MARIADB_ROOT_PASSWORD=temp_password
      - MARIADB_DATABASE=order_db
    volumes:
      - order-db-data:/var/lib/mysql
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7 — notification-service 알림 캐싱 + SSE Pub/Sub
  # ============================================================
  redis:
    image: redis:7
    container_name: conk-redis
    ports:
      - "6379:6379"    # 로컬 개발용 외부 노출
    command: ["--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks:
      - conk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Kafka 3.6 (KRaft 모드 — Zookeeper 불필요)
  # notification-service Consumer + 전 서비스 Producer 공용
  # ============================================================
  kafka:
    image: apache/kafka:latest
    container_name: conk-kafka
    ports:
      - "9094:9094"    # 로컬 Spring Boot 앱 전용 (localhost:9094)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT: Docker 내부 서비스 간 통신 (kafka:9092)
      # EXTERNAL:  호스트에서 실행 중인 Spring Boot 접속용 (localhost:9094)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - conk-network
    restart: unless-stopped
