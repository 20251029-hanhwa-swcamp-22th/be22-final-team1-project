server {
    listen 80;

    # ============================================================
    # OPTIONS preflightл•Љ server л†Ил≤®мЧРмДЬ мЭЉкіД м≤Шл¶ђ
    # location лВілґА if + proxy_pass м°∞нХ©мЭА "if is evil" лђЄм†Ьл°Ь chunked мЭСлЛµмЭД лІЭк∞АлЬ®л¶Љ
    # server л†Ил≤® ifлКФ locationк≥Љ к∞ДмД≠нХШмІА мХКмЬЉлѓАл°Ь мХИм†ДнХШк≤М мВђмЪ© к∞АлК•
    # ============================================================
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    proxy_http_version 1.1;

    # ============================================================
    # CORS к≥µнЖµ нЧ§лНФ (л™®лУ† locationмЧР мГБмЖН вАФ add_headerл•Љ к∞ЦмІА мХКлКФ locationмЧР нХЬнХ®)
    # $http_origin : мЪФм≤≠нХЬ лЄМлЭЉмЪ∞м†А мґЬм≤Шл•Љ кЈЄлМАл°Ь л∞ШмВђ
    #   вЖТ '*' лМАмЛ† мВђмЪ©нХШлКФ мЭімЬ†: Allow-Credentials: trueмЩА '*'лКФ лЄМлЭЉмЪ∞м†Ак∞А нХ®кїШ нЧИмЪ© мХИ нХ®
    # always       : 2xx мЩЄ мШ§л•Ш мЭСлЛµ(401, 5xx лУ±)мЧРлПД нЧ§лНФ мґФк∞А
    # ============================================================
    add_header 'Access-Control-Allow-Origin'      $http_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Tenant-Code' always;

    # ============================================================
    # мЭЄм¶Э мДЬлЄМмЪФм≤≠ лВілґА мЧФлУЬнПђмЭЄнКЄ (мЩЄлґАмЧРмДЬ мІБм†С м†СкЈЉ лґИк∞А)
    # member-serviceмЭШ /member/authorizationмЭД нШЄмґЬнХі JWT к≤Ам¶Э
    # ============================================================
    location = /_auth {
        internal;
        proxy_pass http://member-service:8080/member/authorization;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # Public мЧФлУЬнПђмЭЄнКЄ (JWT мЭЄм¶Э лґИнХДмЪФ)
    # ============================================================
    location ^~ /member/auth/ {
        proxy_pass http://member-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================================
    # Protected мЧФлУЬнПђмЭЄнКЄ (JWT мЭЄм¶Э нХДмЪФ)
    # auth_request вЖТ member-service мЭЄм¶Э нЫД нЧ§лНФ м†ДлЛђ вЖТ л∞±мЧФлУЬ лЭЉмЪ∞нМЕ
    # ============================================================

    # к≥µнЖµ мЭЄм¶Э + нЧ§лНФ м£ЉмЮЕ мД§м†Х
    # auth_requestк∞А 200мЭД л∞ШнЩШнХШл©і нХілЛє мЭСлЛµ нЧ§лНФл•Љ л∞±мЧФлУЬл°Ь м†ДлЛђ
    location /member {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://member-service:8080;
    }

    location /integrations {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://integration-service:8080;
    }

    location /notifications {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        # SSE(Server-Sent Events) мІАмЫРмЭД мЬДнХЬ л≤ДнНЉлІБ лєДнЩЬмД±нЩФ
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        proxy_pass http://notification-service:8080;
    }

    location /wms {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://wms-service:8080;
    }

    location /orders {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://order-service:8080;
    }

    # мЭЄм¶Э мЛ§нМ® мЛЬ 401 л∞ШнЩШ
    error_page 401 = @error401;
    location @error401 {
        # add_headerл•Љ мІБм†С м†ХмЭШнХШлКФ locationмЭА мДЬл≤Д л†Ил≤® CORS нЧ§лНФл•Љ мГБмЖНл∞ЫмІА л™їнХ®
        # вЖТ 401 мЭСлЛµмЧРлПД CORS нЧ§лНФл•Љ л™ЕмЛЬнХімХЉ лЄМлЭЉмЪ∞м†Ак∞А мШ§л•Ш лВімЪ©мЭД мЭљмЭД мИШ мЮИмЭМ
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Type' 'application/json' always;
        return 401 '{"success":false,"message":"Unauthorized"}';
    }
}
