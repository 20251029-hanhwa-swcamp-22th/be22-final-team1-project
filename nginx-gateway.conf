server {
    listen 80;

    # ============================================================
    # CORS 공통 헤더 (모든 location에 상속 — add_header를 갖지 않는 location에 한함)
    # $http_origin : 요청한 브라우저 출처를 그대로 반사
    #   → '*' 대신 사용하는 이유: Allow-Credentials: true와 '*'는 브라우저가 함께 허용 안 함
    # always       : 2xx 외 오류 응답(401, 5xx 등)에도 헤더 추가
    # ============================================================
    add_header 'Access-Control-Allow-Origin'      $http_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Tenant-Code' always;

    # ============================================================
    # 인증 서브요청 내부 엔드포인트 (외부에서 직접 접근 불가)
    # member-service의 /member/authorization을 호출해 JWT 검증
    # ============================================================
    location = /_auth {
        internal;
        proxy_pass http://member-service:8080/member/authorization;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # Public 엔드포인트 (JWT 인증 불필요)
    # ============================================================
    location = /member/auth/login {
        # OPTIONS preflight: 브라우저가 실제 요청 전 허용 여부 확인하는 사전 요청
        # 백엔드까지 가지 않고 즉시 204로 응답 (서버 부하 감소)
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_pass http://member-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /member/auth/setup-password {
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_pass http://member-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /member/auth/refresh {
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_pass http://member-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================================
    # Protected 엔드포인트 (JWT 인증 필요)
    # auth_request → member-service 인증 후 헤더 전달 → 백엔드 라우팅
    # ============================================================

    # 공통 인증 + 헤더 주입 설정
    # auth_request가 200을 반환하면 해당 응답 헤더를 백엔드로 전달
    location /member {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://member-service:8080;
    }

    location /integrations {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://integration-service:8080;
    }

    location /notifications {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        # SSE(Server-Sent Events) 지원을 위한 버퍼링 비활성화
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        proxy_pass http://notification-service:8080;
    }

    location /wms {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://wms-service:8080;
    }

    location /orders {
        if ($request_method = 'OPTIONS') { return 204; }

        auth_request /_auth;
        auth_request_set $x_user_id    $upstream_http_x_user_id;
        auth_request_set $x_user_name  $upstream_http_x_user_name;
        auth_request_set $x_seller_id  $upstream_http_x_seller_id;
        auth_request_set $x_tenant_id  $upstream_http_x_tenant_id;
        auth_request_set $x_role       $upstream_http_x_role;

        proxy_set_header X-User-Id    $x_user_id;
        proxy_set_header X-User-Name  $x_user_name;
        proxy_set_header X-Seller-Id  $x_seller_id;
        proxy_set_header X-Tenant-Id  $x_tenant_id;
        proxy_set_header X-Role       $x_role;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;

        proxy_pass http://order-service:8080;
    }

    # 인증 실패 시 401 반환
    error_page 401 = @error401;
    location @error401 {
        # add_header를 직접 정의하는 location은 서버 레벨 CORS 헤더를 상속받지 못함
        # → 401 응답에도 CORS 헤더를 명시해야 브라우저가 오류 내용을 읽을 수 있음
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Type' 'application/json' always;
        return 401 '{"success":false,"message":"Unauthorized"}';
    }
}
