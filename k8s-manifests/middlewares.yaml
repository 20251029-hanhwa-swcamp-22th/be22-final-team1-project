# ============================================================
# PersistentVolumeClaim (PVC) - 각 MariaDB 및 미들웨어용
# ============================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: member-db-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

