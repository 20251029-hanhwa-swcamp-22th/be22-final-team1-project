# ============================================================
# MariaDB - member-db
# ============================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-db
  namespace: default
  labels:
    app: member-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member-db
  template:
    metadata:
      labels:
        app: member-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: "temp_password"
            - name: MARIADB_DATABASE
              value: "member_db"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: member-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: member-db-service
  namespace: default
  labels:
    app: member-db
spec:
  type: ClusterIP
  selector:
    app: member-db
  ports:
    - port: 3306
      targetPort: 3306

