name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'team1-frontend'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'team1-frontend'

concurrency:
  group: k8s-manifests-update
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up SSH for k8s-manifests
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K8S_DEPLOY_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Clone k8s-manifests via SSH
        run: git clone git@github.com:gusgh075/hw22th-final-team1-k8s-manifest.git k8s-manifests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: team1-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: team1-frontend

      - name: Build
        run: npm run build:prod
        working-directory: team1-frontend

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./team1-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-service:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-service:latest
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_API_PREFIX=${{ vars.VITE_API_PREFIX }}
            VITE_DEMO_USER_PASSWORD=${{ vars.VITE_DEMO_USER_PASSWORD }}

      - name: Update Kubernetes resources
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i "s|image: .*/frontend-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-service:${{ github.run_number }}|g" k8s-manifests/deployments.yaml

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd k8s-manifests
          git remote set-url origin git@github.com:gusgh075/hw22th-final-team1-k8s-manifest.git
          git pull --rebase origin HEAD
          git add deployments.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            LAST_MSG=$(git log -1 --format='%s')
            if echo "$LAST_MSG" | grep -q "run #${{ github.run_number }}"; then
              git commit --amend --no-edit
            else
              git commit -m "chore: update image tags (run #${{ github.run_number }}) [skip ci]"
            fi
            git push --force-with-lease origin HEAD
          fi
