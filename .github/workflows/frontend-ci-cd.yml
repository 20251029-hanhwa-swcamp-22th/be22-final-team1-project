name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'team1-frontend'     # team1-frontend 서브모듈 변경 시에만 CI 실행 (불필요한 빌드 방지)
  pull_request:
    branches: [ "main" ]
    paths:
        - 'team1-frontend'
  workflow_dispatch:         # GitHub UI에서 수동으로 워크플로를 실행할 수 있도록 허용

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  CLOUDFRONT_ID: ${{ vars.CLOUDFRONT_ID }}
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
  VITE_API_PREFIX: ${{ vars.VITE_API_PREFIX }}
  VITE_DEMO_USER_PASSWORD: ${{ vars.VITE_DEMO_USER_PASSWORD }}

jobs:
  # ────────────────────────────────────────────────
  # Job 1: 소스 빌드 + Docker 이미지 빌드 & push
  # ────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 전체 서브모듈을 한꺼번에 clone하면 불필요한 백엔드 소스까지 내려받아 시간이 오래 걸린다.
      # 따라서 메인 레포만 먼저 체크아웃하고, 아래 단계에서 frontend 서브모듈만 별도로 초기화한다.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # 전체 git 히스토리 포함 (태그/브랜치 비교에 필요)
          submodules: false    # 서브모듈은 아직 초기화하지 않음

      # team1-frontend 서브모듈만 선택적으로 초기화
      - name: Checkout frontend submodule
        run: git submodule update --init -- team1-frontend

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: team1-frontend/node_modules
          key: ${{ runner.OS }}-build-${{ hashFiles('team1-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-build-
            ${{ runner.OS }}-

      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY_ID }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # package-lock.json이 없으므로 npm ci 대신 npm install 사용
      - name: Install dependencies
        run: npm install
        working-directory: team1-frontend

      # VITE_* 환경변수는 워크플로우 레벨 env에서 모든 step으로 자동 상속됨
      - name: Build
        run: npm run build:prod
        working-directory: team1-frontend

      - name: Sync files to S3
        if: github.ref == 'refs/heads/main'
        run: aws s3 sync --delete ./dist s3://${{ env.S3_BUCKET }}
        working-directory: team1-frontend

      - name: Clear Cache
        if: github.ref == 'refs/heads/main'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"

      # 멀티 플랫폼(amd64/arm64) 이미지 빌드를 위한 Buildx 설정
      # main 브랜치가 아닌 PR에서는 이미지를 push하지 않으므로 main 브랜치에서만 실행
      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 태그를 2개 부여한다:
      #   - run_number : 이 실행 고유 번호로, 특정 버전으로 롤백할 때 사용
      #   - latest     : 항상 최신 이미지를 가리키는 alias
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./team1-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-service:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-service:latest
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_API_PREFIX=${{ env.VITE_API_PREFIX }}
            VITE_DEMO_USER_PASSWORD=${{ env.VITE_DEMO_USER_PASSWORD }}
