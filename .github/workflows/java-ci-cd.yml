name: Reusable Java CI/CD

# 여러 백엔드 서비스 workflow에서 공통으로 호출하는 재사용 가능한 workflow.
# 역할: 소스 빌드 → Docker 이미지 push → k8s-manifests 이미지 태그 업데이트
on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      use_dockerhub:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      K8S_DEPLOY_KEY:
        required: true

jobs:
  # ────────────────────────────────────────────────
  # Job 1: 소스 빌드 + Docker 이미지 빌드 & push
  # ────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      # update-k8s job에서 사용할 이미지 경로를 output으로 노출
      image_path: ${{ steps.set-image.outputs.image_path }}
    steps:
      # 메인 레포 체크아웃 (서브모듈은 아직 초기화하지 않음)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      # 해당 서비스의 서브모듈만 선택적으로 초기화 (전체 서브모듈 clone 방지)
      - name: Checkout service submodule
        run: git submodule update --init -- ${{ inputs.working_directory }}

      # Gradle 빌드에 필요한 JDK 21 설치 및 Gradle 캐시 활성화
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # gradlew에 실행 권한 부여 (Windows에서 커밋된 파일은 실행 비트가 없을 수 있음)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ${{ inputs.working_directory }}

      # 테스트 제외 빌드 (-x test): CI에서는 빌드 성공 여부만 확인
      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: ${{ inputs.working_directory }}

      # 멀티 플랫폼 Docker 이미지 빌드를 위한 Buildx 설정 (main 브랜치에서만)
      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인 (main 브랜치 + use_dockerhub=true 인 경우에만)
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker 이미지 빌드 후 Docker Hub에 push
      # 태그 2개: run_number(고정 버전) + latest(최신 버전 alias)
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.working_directory }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest

      # 다음 job(update-k8s)에서 사용할 이미지 경로를 GITHUB_OUTPUT에 저장
      - name: Set image path output
        if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
        id: set-image
        run: echo "image_path=${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.run_number }}" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────
  # Job 2: k8s-manifests 이미지 태그 업데이트
  #
  # [concurrency group을 사용하지 않는 이유]
  # GitHub Actions concurrency group은 "1개 running + 1개 pending"만 허용.
  # 5개 서비스가 동시에 push되면 3개는 자동 cancel → 이미지 태그 누락 발생.
  # 대신 fetch → rebase → push 10회 retry + 점진적 backoff으로 race condition 해소.
  # ────────────────────────────────────────────────
  update-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    # build-and-push job이 이미지를 실제로 push한 경우에만 실행
    if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
    permissions:
      contents: write
    steps:
      # k8s-manifests 레포를 SSH로 clone하기 위한 Deploy Key 등록
      - name: Set up SSH for k8s-manifests
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K8S_DEPLOY_KEY }}

      # k8s-manifests 레포를 SSH로 clone (HTTPS 대신 SSH: deploy key 인증)
      - name: Clone k8s-manifests via SSH
        run: git clone git@github.com:gusgh075/hw22th-final-team1-k8s-manifest.git k8s-manifests

      # deployments.yaml에서 해당 서비스의 image 태그를 새 버전으로 교체
      # sed 패턴: "image: <anything>/image_name:<any_tag>" → "image: <new_image_path>"
      - name: Update image tag in deployments.yaml
        run: |
          IMAGE_PATH="${{ needs.build-and-push.outputs.image_path }}"
          sed -i "s|image: .*/\?${{ inputs.image_name }}:.*|image: $IMAGE_PATH|g" k8s-manifests/deployments.yaml

      # 변경 사항을 커밋하고 push (race condition 대비 10회 retry)
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd k8s-manifests
          git remote set-url origin git@github.com:gusgh075/hw22th-final-team1-k8s-manifest.git
          git add deployments.yaml

          # 이미 동일한 태그가 반영되어 있으면 커밋 불필요
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # 서비스명을 포함한 커밋 메시지로 어떤 서비스가 업데이트됐는지 구분
          # [skip ci]: k8s-manifests 레포 자체의 CI가 있을 경우 무한 루프 방지
          git commit -m "chore: update ${{ inputs.image_name }} tag (run #${{ github.run_number }}) [skip ci]"

          # 여러 서비스 workflow가 동시에 push할 때 race condition 해소 retry 루프
          # 전략: fetch → rebase → push (rebase 후에는 항상 fast-forward 상태)
          # backoff: i*2 + rand(0~4)초 → 2~6s, 4~8s, 6~10s ... 점진적으로 증가
          # 7개 서비스 동시 push 최악 케이스 필요 시간 ~21초 대비 예산 ~140초로 충분
          pushed=false
          for i in $(seq 1 10); do
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main && { pushed=true; break; }
            echo "Push failed (attempt $i/10), retrying..."
            sleep $((i * 2 + RANDOM % 5))
          done

          # 10회 모두 실패 시 workflow를 명시적으로 실패 처리
          # (이전에는 exit 1이 없어서 push 실패해도 workflow가 success로 표시됨)
          if [ "$pushed" = "false" ]; then
            echo "ERROR: Failed to push to k8s-manifests after 10 attempts"
            exit 1
          fi
