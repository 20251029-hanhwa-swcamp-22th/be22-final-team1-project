name: Reusable Java CI/CD

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      K8S_DEPLOY_KEY:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Set up SSH for k8s-manifests
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K8S_DEPLOY_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ${{ inputs.working_directory }}

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: ${{ inputs.working_directory }}

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.working_directory }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest

      - name: Build and push Docker image (GHCR only)
        if: github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME == ''
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.working_directory }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest

      - name: Update Kubernetes resources
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            IMAGE_PATH="${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}"
          else
            IMAGE_PATH="ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}"
          fi
          sed -i "s|image: .*/\?${{ inputs.image_name }}:.*|image: $IMAGE_PATH|g" k8s-manifests/deployments.yaml

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd k8s-manifests
          git remote set-url origin git@github.com:gusgh075/hw22th-final-team1-k8s-manifest.git
          git add deployments.yaml
          git commit -m "chore: update ${{ inputs.service_name }} image to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD
