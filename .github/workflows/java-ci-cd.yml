name: Reusable Java CI/CD

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      use_dockerhub:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      K8S_DEPLOY_KEY:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up SSH for k8s-manifests
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K8S_DEPLOY_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Checkout service submodule
        run: git submodule update --init -- ${{ inputs.working_directory }}

      - name: Clone k8s-manifests via SSH
        run: git clone git@github.com:gusgh075/hw22th-final-team1-k8s-manifest.git k8s-manifests

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ${{ inputs.working_directory }}

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: ${{ inputs.working_directory }}

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.working_directory }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest

      - name: Update Kubernetes resources
        if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
        run: |
          IMAGE_PATH="${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.run_number }}"
          sed -i "s|image: .*/\?${{ inputs.image_name }}:.*|image: $IMAGE_PATH|g" k8s-manifests/deployments.yaml

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main' && inputs.use_dockerhub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd k8s-manifests
          git remote set-url origin git@github.com:gusgh075/hw22th-final-team1-k8s-manifest.git
          git add deployments.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            LAST_MSG=$(git log -1 --format='%s')
            if echo "$LAST_MSG" | grep -q "run #${{ github.run_number }}"; then
              git commit --amend --no-edit
            else
              git commit -m "chore: update image tags (run #${{ github.run_number }}) [skip ci]"
            fi
            for i in 1 2 3; do
              git pull --rebase origin HEAD && git push --force-with-lease origin HEAD && break
              echo "Push failed, retrying ($i/3)..."
              sleep $((RANDOM % 5 + 2))
            done
          fi
