name: Backend Integration CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'team1-backend-integration'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'team1-backend-integration'

permissions:
  contents: write

concurrency:
  group: k8s-manifests-update
  cancel-in-progress: false

jobs:
  call-workflow:
    uses: ./.github/workflows/java-ci-cd.yml
    with:
      service_name: integration-service
      working_directory: team1-backend-integration
      image_name: integration-service
      use_dockerhub: true
    secrets: inherit
